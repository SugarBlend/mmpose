[project]
name = "PoseTrainer"
version = "0.1.0"
requires-python = "==3.10.*"

dependencies = [
    "numpy<2",
    "scikit-learn>=1.3",
    "label-studio-sdk==2.0.*",
    "label-studio-converter==0.0.59",
    "label-studio==1.21.0",
    "label-studio-ml",
    "ultralytics==8.3.206",
    "opencv-python~=4.9.0.80",
    "pycairo",
    "nuitka",
    "torch==2.1.2",
    "torchvision==0.16.2",
    "torchaudio==2.1.2",
    "mmpretrain==1.2.0",
    "mmdeploy==1.3.1",
    "mmdet>=3.0.0,<3.3.0",
    "mmpose==1.3.2",
    "onnx==1.16.0",
    "onnxruntime-gpu==1.20.1",
    "PyQt5",
    "setuptools==79.0.1",
    "kornia",
    "mmcv @ https://download.openmmlab.com/mmcv/dist/cu121/torch2.1.0/mmcv-2.1.0-cp310-cp310-win_amd64.whl"
]

[tool.uv]
index-url = "https://pypi.org/simple"
extra-index-url = [
    "https://download.pytorch.org/whl/cu121"
]
required-environments = [
    "sys_platform == 'win32' and platform_machine == 'AMD64'"
]

[tool.uv.extra-build-dependencies]
scikit-learn = ["setuptools", "wheel", "cython"]
